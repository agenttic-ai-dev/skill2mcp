name: Bug report
description: Report a reproducible defect in skill2mcp
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include enough detail to reproduce quickly.
  - type: input
    id: summary
    attributes:
      label: Summary
      description: One-line description of the bug
      placeholder: build --mode strict exits 0 even with parse errors
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide exact commands and files involved
      placeholder: |
        1. Run `npm run gen -- ./fixtures/skills --out /tmp/out --mode strict`
        2. Observe output
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: skill2mcp version
      placeholder: 0.1.0
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: Node version, OS, relevant env vars (without secrets)
